name: absensi_selfie_lokasi
description: UniCheck Application


publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.9
  supabase_auth_ui: ^0.4.1

  # Kamera Mobile
  camera: ^0.10.6

  # Ambil gambar
  image_picker: ^1.0.4

  # GPS
  geolocator: ^10.1.0
  geocoding: ^3.0.0

  # HTTP
  http: ^1.1.0

  # Format tanggal
  intl: ^0.18.1

  device_info_plus: ^10.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/unicheck_logo.png"
  web:
    generate: true
    image_path: "assets/images/unicheck_logo.png"
    background_color: "#F8FAFC"
    theme_color: "#4343D9"